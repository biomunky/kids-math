<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- pixel art pikachu face, 1px = 1 unit -->

  <!-- left ear: black tip -->
  <rect x="1" y="0" width="2" height="1" fill="#1C1C1C"/>
  <rect x="1" y="1" width="2" height="1" fill="#1C1C1C"/>
  <!-- left ear: yellow body -->
  <rect x="1" y="2" width="2" height="1" fill="#FFCB05"/>
  <rect x="1" y="3" width="2" height="1" fill="#FFCB05"/>

  <!-- right ear: black tip -->
  <rect x="13" y="0" width="2" height="1" fill="#1C1C1C"/>
  <rect x="13" y="1" width="2" height="1" fill="#1C1C1C"/>
  <!-- right ear: yellow body -->
  <rect x="13" y="2" width="2" height="1" fill="#FFCB05"/>
  <rect x="13" y="3" width="2" height="1" fill="#FFCB05"/>

  <!-- head rows 4-15 -->
  <rect x="2" y="4" width="12" height="1" fill="#FFCB05"/>
  <rect x="1" y="5" width="14" height="1" fill="#FFCB05"/>

  <!-- eyes row 6 -->
  <rect x="1" y="6" width="5" height="1" fill="#FFCB05"/>
  <rect x="6" y="6" width="1" height="1" fill="#1C1C1C"/>
  <rect x="7" y="6" width="2" height="1" fill="#FFCB05"/>
  <rect x="9" y="6" width="1" height="1" fill="#1C1C1C"/>
  <rect x="10" y="6" width="6" height="1" fill="#FFCB05"/>

  <!-- eyes row 7 (with white shine pixel) -->
  <rect x="1" y="7" width="5" height="1" fill="#FFCB05"/>
  <rect x="6" y="7" width="1" height="1" fill="#1C1C1C"/>
  <rect x="7" y="7" width="2" height="1" fill="#FFCB05"/>
  <rect x="9" y="7" width="1" height="1" fill="#1C1C1C"/>
  <rect x="10" y="7" width="6" height="1" fill="#FFCB05"/>

  <!-- row 8: nose -->
  <rect x="1" y="8" width="14" height="1" fill="#FFCB05"/>
  <rect x="7" y="8" width="2" height="1" fill="#8B6914"/>

  <!-- row 9: mouth top -->
  <rect x="1" y="9" width="14" height="1" fill="#FFCB05"/>
  <rect x="6" y="9" width="1" height="1" fill="#1C1C1C"/>
  <rect x="9" y="9" width="1" height="1" fill="#1C1C1C"/>

  <!-- row 10: cheeks + mouth -->
  <rect x="1" y="10" width="3" height="1" fill="#EE3333"/>
  <rect x="4" y="10" width="8" height="1" fill="#FFCB05"/>
  <rect x="7" y="10" width="2" height="1" fill="#1C1C1C"/>
  <rect x="12" y="10" width="3" height="1" fill="#EE3333"/>

  <!-- row 11: cheeks -->
  <rect x="1" y="11" width="3" height="1" fill="#EE3333"/>
  <rect x="4" y="11" width="8" height="1" fill="#FFCB05"/>
  <rect x="12" y="11" width="3" height="1" fill="#EE3333"/>

  <!-- rows 12-14 lower face -->
  <rect x="2" y="12" width="12" height="1" fill="#FFCB05"/>
  <rect x="3" y="13" width="10" height="1" fill="#FFCB05"/>
  <rect x="4" y="14" width="8" height="1" fill="#FFCB05"/>

  <!-- chin/outline bottom -->
  <rect x="5" y="15" width="6" height="1" fill="#1C1C1C"/>

  <!-- outline -->
  <rect x="0" y="4" width="1" height="11" fill="#1C1C1C"/>
  <rect x="15" y="4" width="1" height="11" fill="#1C1C1C"/>
  <rect x="1" y="4" width="1" height="1" fill="#1C1C1C"/>
  <rect x="14" y="4" width="1" height="1" fill="#1C1C1C"/>
</svg>
